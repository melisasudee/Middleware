version: "3.9"

services:
  # =====================================
  # Middleware Service (Main Application)
  # =====================================
  middleware:
    build:
      context: .
      dockerfile: Dockerfile.middleware
    container_name: finalproje-middleware
    image: middleware:latest
    
    ports:
      - "5000:5000"
    
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////app/data/middleware.db
      JWT_SECRET_KEY: dev-jwt-secret-key
      API_KEYS: local-api-key
      LOG_LEVEL: INFO
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: secret
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./instance:/app/instance
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    
    networks:
      - middleware-network
    
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "1"
          memory: 512M

  # =====================================
  # Data Generator Service (Creates test data)
  # =====================================
  data-generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: finalproje-generator
    image: data-generator:latest

    ports:
      - "5001:5001"
    environment:
      TARGET: http://middleware:5000/api/process
      API_KEY: local-api-key
      SCENARIO: normal
      COUNT: 100
      MODE: server
      PORT: 5001
      AUTO_GENERATE: "true"
      AUTO_GENERATE_LOOP: "false"
      AUTO_GENERATE_DELAY: "5"
    
    depends_on:
      middleware:
        condition: service_healthy

    networks:
      - middleware-network

    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

# Networks
networks:
  middleware-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes
volumes:
  app_data:
  app_logs:
